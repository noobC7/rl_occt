seed: 40

env:
  max_steps: None
  eval_max_steps: 1500
  scenario_name: "occt_scenario"
  scenario:
    enable_obs_audit: False
    viewer_zoom: 20.0
    resolution_factor: 3
    n_agents: 5
    task_class: 1
    is_rand_arc_pos: False
    cargo_half_width: 2
    threshold_near_other_agents_c2c_high: 6
    max_speed: 8
    init_vel_std: 1
    still_space: 6
    init_arc_pos: 0.0
    use_center_frenet_ref: True
    n_nearing_agents_observed: 2
    use_history_observation: False
    history_obs_len: 10
    n_observed_steps: 10
    n_stored_steps: 10
    history_obs_dim: null
    # reward weights
    reward_progress: 5.0
    reward_vel: 0
    reward_goal: 0
    reward_platoon_vel: 20
    reward_platoon_space: 20
    reward_platoon_ref: 50
    reward_platoon_heading: 10

    reward_hinge: 20000
    reward_hinge_vel: 20
    reward_hinge_space: 20
    reward_hinge_ref: 20
    reward_approach_hinge: 50

    penalty_goal_incomplete_hinge: -300
    goal_incomplete_hinge_penalty_mode: constant
    penalty_near_boundary: -200
    penalty_near_other_agents: -200
    penalty_change_steering: -1.0
    penalty_change_acc: -0.001
    penalty_collide_with_agents: -400
    penalty_outside_boundaries: -400
    penalty_hinge_time_cost: -80
    penalty_backward: -400
  device: ???
  vmas_envs: 300

model:
  shared_parameters: True
  centralised_critic: True
  is_actor_retentive: True
  is_critic_bi_head: False
  actor:
    depth: 2
    num_cells: 344
    fields:
      include: null
      exclude:
        - self_hinge_status
    retentive:
      self_keys:
        - self_vel
        - self_speed
        - self_steering
        - self_acc
        - self_ref_velocity
        - self_ref_points
        - self_hinge_preview_info
        - self_distance_to_ref
        - self_left_boundary_distance
        - self_right_boundary_distance
        - self_distance_to_left_boundary
        - self_distance_to_right_boundary
        - self_platoon_error_vel
        - self_hinge_error_vel
        - self_platoon_error_space
      hinge_key: self_hinge_past_info
      other_keys:
        - others_pos
        - others_rot
        - others_relative_longitudinal_velocity
        - others_relative_acceleration
        - others_distance
  critic:
    depth: 2
    num_cells: 688
    fields:
      include: null
      exclude:
        - self_hinge_status
    phase_obs_key: self_hinge_status

collector:
  frames_per_batch: 60_000
  n_iters: 300
  total_frames: ???

buffer:
  memory_size: ???

loss:
  gamma: 0.99
  lmbda: 0.95
  entropy_eps: 0.05
  clip_epsilon: 0.2

train:
  num_epochs: 45
  minibatch_size: 4096
  lr: 5e-5
  max_grad_norm: 40.0
  device: ???
  resume_mode: fine_tune
  #resume_from_checkpoint: /home/yons/Graduation/rl_occt/outputs/2026-03-29/12-27-15_mlp_full_obse_road_extend_train/checkpoints/checkpoint_iter_299_frames_18000000.pt
  #resume_from_checkpoint: /home/yons/Graduation/rl_occt/outputs/2026-03-29/20-30-34_mlp_full_obse_road_extend_more_hinge_reward_offset_train/checkpoints/checkpoint_iter_299_frames_18000000.pt
  resume_from_checkpoint: None
  
eval:
  evaluation_interval: 10
  evaluation_episodes: 6
  render_batch_size: 6

logger:
  backend: swanlab
  project_name: "MAPPO_OCCT_TWO_STAGE"
  group_name: "mlp_road_extend_baseline"
  description: "0330新基线，使用扩展道路，hineg的reward权重还有offset，actor网络加了LSTM"
  resume_swanlab_id: None
  mode: cloud
