seed: 40

env:
  max_steps: None
  eval_max_steps: 400
  scenario_name: "platoon_scenario"
  scenario:
    enable_failure_replay_restore: False
    target_road_id: 0
    enable_obs_audit: False
    viewer_zoom: 20.0
    resolution_factor: 3
    n_agents: 3
    task_class: 0
    is_rand_arc_pos: True
    cargo_half_width: 2
    threshold_near_other_agents_c2c_high: 6
    max_speed: 8
    init_vel_mean: 3
    init_vel_std: 0.5
    still_space: 6
    init_arc_pos: 0.0
    use_center_frenet_ref: True
    n_nearing_agents_observed: 2
    use_history_observation: False
    history_obs_len: 10
    n_observed_steps: 10
    n_stored_steps: 10
    history_obs_dim: null
    # reward weights
    reward_progress: 20.0
    reward_vel: 0
    reward_goal: 100
    reward_platoon_vel: 20
    reward_platoon_space: 50
    reward_platoon_ref: 50
    reward_platoon_heading: 0
    
    penalty_near_boundary: -100
    penalty_near_other_agents: -100
    penalty_change_steering: -1.0
    penalty_change_acc: -0.001
    penalty_collide_with_agents: -200
    penalty_outside_boundaries: -200
    penalty_backward: -100
  device: ???
  vmas_envs: 300

model:
  shared_parameters: True
  centralised_critic: True
  is_actor_retentive: False
  is_critic_bi_head: False
  actor:
    depth: 2
    num_cells: 192
    fields:
      include: null
      exclude:
        - self_hinge_status
        - self_hinge_past_info
  critic:
    depth: 2
    num_cells: 688
    fields:
      include: null
      exclude:
        - self_hinge_status

collector:
  frames_per_batch: 60_000
  n_iters: 100
  total_frames: ???

buffer:
  memory_size: ???

loss:
  gamma: 0.9
  lmbda: 0.9
  entropy_eps: 0.05
  clip_epsilon: 0.2

train:
  num_epochs: 45
  minibatch_size: 4096
  lr: 5e-5
  max_grad_norm: 40.0
  device: ???
  resume_mode: resume # fine_tune, resume or warm_start
  resume_from_checkpoint: null
eval:
  evaluation_interval: 10
  evaluation_episodes: 2
  render_batch_size: 2

logger:
  backend: swanlab
  project_name: "MAPPO_PLATOON_0411"
  group_name: "mappo_mlp_rand_arc"
  description: "mappo_mlp_rand_arc"
  resume_swanlab_id: null
  mode: cloud # cloud or local
