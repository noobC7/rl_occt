seed: 40

env:
  max_steps: None
  eval_max_steps: 1500
  scenario_name: "occt_scenario"
  scenario:
    enable_obs_audit: False
    viewer_zoom: 20.0
    resolution_factor: 3
    n_agents: 5
    task_class: 1
    is_rand_arc_pos: False
    mask_ref_v: False
    cargo_half_width: 2
    threshold_near_other_agents_c2c_high: 6
    max_speed: 8
    init_vel_std: 1 # useless if is_rand_init_vel is False
    still_space: 6
    init_arc_pos: 0.0 # useless if is_rand_arc_pos is False
    use_center_frenet_ref: True # True means use continuous frenet reference, False means use discrete reference
    n_nearing_agents_observed: 2
    use_history_observation: False
    history_obs_len: 5 # capped by n_observed_steps
    history_obs_dim: null # null keeps the raw concatenated history feature dimension
    # reward weights
    reward_progress: 5.0
    reward_vel: 0
    reward_goal: 0
    reward_platoon_vel: 20       
    reward_platoon_space: 20
    reward_platoon_ref: 50
    reward_platoon_heading: 10
    
    reward_hinge: 20000    
    reward_hinge_vel: 20
    reward_hinge_space: 20
    reward_hinge_ref: 20
    reward_approach_hinge: 5

    penalty_goal_incomplete_hinge: -300
    goal_incomplete_hinge_penalty_mode: constant
    penalty_near_boundary: -200
    penalty_near_other_agents: -200
    penalty_change_steering: -0.0
    penalty_change_acc: -0.0
    penalty_collide_with_agents: -400
    penalty_outside_boundaries: -400
    penalty_hinge_time_cost: -80
    penalty_backward: -400
  device: ??? # These values will be populated dynamically
  vmas_envs: 300

model:
  shared_parameters: True
  centralised_critic: True  # kept for the MLP/IPPO script compatibility
  use_phase_conditioned_network: False
  actor_depth: 2
  actor_num_cells: 344
  actor_head_hidden: 128
  critic_depth: 2
  critic_num_cells: 688
  critic_head_hidden: 256
  phase_obs_group: self_hinge_status

collector:
  frames_per_batch: 60_000 # Frames sampled each sampling iteration
  n_iters: 300 # Number of sampling/training iterations
  total_frames: ???

buffer:
  memory_size: ???

loss:
  gamma: 0.99
  lmbda: 0.95
  entropy_eps: 0.05
  clip_epsilon: 0.2

adaptive_weighting:
  enabled: False
  ema_tau: 0.1
  initial_hinge_weight: 0.0
  min_platoon_weight: 0.2
  max_hinge_weight: 0.8
  collision_high_threshold: 0.20
  collision_low_threshold: 0.08
  platoon_space_error_threshold: 0.60
  platoon_ref_error_threshold: 0.20
  all_hinged_target: 0.85
  all_hinged_plateau_delta: 0.01
  plateau_patience: 3
  hinge_weight_step: 0.05
  collision_weight_step: 0.10

train:
  num_epochs: 45  # optimization steps per batch of data collected
  minibatch_size: 4096 # size of minibatches used in each epoch
  lr: 5e-5
  max_grad_norm: 40.0
  device: ???
  resume_mode: fine_tune
  resume_from_checkpoint: None # absolute path

eval:
  evaluation_interval: 10
  evaluation_episodes: 6
  render_batch_size: 6

logger:
  # api: k6ojXGwJPKWLounY3nzZX
  backend: swanlab # Delete to remove logging
  project_name: "MAPPO_OCCT_TWO_STAGE"
  group_name: "ours0324_full_obse_mlp_eval"
  resume_swanlab_id: None # copy from swanlab page
  mode: local
